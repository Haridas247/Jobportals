{% load static %}
<!DOCTYPE html>

<html>
    <head>
        <title>Job List</title>
        <link rel="stylesheet" href="{% static 'jobs/style.css'%}">
    </head> 
    <body>
        <h1>All Jobs</h1>
        <form method="POST" action="/logout/">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    {% for job in jobs %}
        <h2>{{job.title}}</h2>
        <p>Company: {{ job.company }}</p>
        <p>Location: {{job.location }}</p>
        <p>{{ job.description }}</p>
        <hr>
        {% endfor %}
    </body>
</html>
